name: tide
help: |
  the terminal development environment fabricator aiming to be the developer entrypoint.
  It is a full CLI tool allowing you to manage and use all development
  environments you may need.
version: v0.1.0
commands:
  - name: init
    alias: ini
    help: |
      Initialize a new tide project.
      This is where to start. After a tide project is created, you have access
      to the full set of tide commands to manage and use your development
      environment instances.
      By default, creates the project within the current directory unless you
      are within a git repository
      Use flags to change this behavior.
    flags:
      - long: --ignore-git
        short: -i
        help: |
          Ignore the git root directory following and create the project in the
          current directory.
          Has no effect if not within a git repository directory
    dependencies:
      git: A recent version of git is required
  - name: instance
    alias: ins
    help: |
      Manage your instances with ease.
      An instance is a development environment.
      Each instance may be in one of following states:
      - created: freshly created from a template, not yet ready to be used (must be built)
      - stopped: built instance that is not running
      - running: an instance that is currently running
    commands:
      - name: list
        alias: [ls, l]
        help: |
          Lists existing instances.
          By default, lists instances that are local to your current project.
          Use flags to change this behavior.
        flags:
          - long: --global
            short: -g
            help: Take all instances into account, system wide
          - long: --filter
            short: -f
            arg: status
            allowed:
              - created
              - stopped
              - running
            help: Filters instances by status
  - name: template
    alias: t
    help: |
      Manage your templates with ease.
      A template is some kind of recipe to build an instance.
      Each template represents a development environment for a specific set of
      tasks.
      You could have a template for web application development or
      decentralized application development using the blockchain technology.
    commands:
      - name: list
        alias: [ls, l]
        help: |
          Lists existing templates.
          By default, lists all existing templates for tide, both official
          templates and local templates you may have created in your current
          project.
          Use flags to change this behavior.
        flags:
          - long: --official
            short: -o
            help: |
              Only list official templates.
              Official templates are those actively maintained by the tide
              repository you are using.
            conflicts:
              - --local
          - long: --local
            short: -l
            help: |
              Only list local templates in your project.
              Local templates are those located in your current project.
            conflicts:
              - --official
